name: 'Build Documentation Site'
description: 'Setup environment, run quality checks, and build Astro documentation site'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: '10'
  working-directory:
    description: 'Working directory containing the doc project'
    required: false
    default: 'doc'

outputs:
  build-output-path:
    description: 'Path to the build output directory'
    value: 'dist'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: '${{ inputs.working-directory }}/pnpm-lock.yaml'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: Type check
      run: pnpm run check
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: Format check
      run: pnpm run format:check
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    - name: Build site
      run: pnpm build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_ENV: production

    - name: Verify build output
      run: |
        if [ ! -d "dist" ]; then
          echo "Error: dist/ directory not found"
          exit 1
        fi
        HTML_COUNT=$(find dist -name "*.html" | wc -l)
        echo "HTML files: $HTML_COUNT"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
