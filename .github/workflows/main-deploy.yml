name: Production Deploy (Cloudflare Workers)

# Builds the zudo-doc site in /doc and deploys it to Cloudflare Workers
# (static assets) on every push to main.
#
# The deploy is GUARDED: it runs only when BOTH Cloudflare secrets are present
# AND the wrangler.toml domain placeholder has been replaced. Until then the
# job still builds + typechecks (so merges to main stay green) but skips the
# actual publish. See doc/wrangler.toml and the Cloudflare go-live checklist
# in doc/CLAUDE.md.

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-deploy:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: doc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the doc-history plugin's preBuild can populate the
          # Created/Updated/Author meta block (and, in CI, the per-page history
          # JSON via postBuild — auto-enabled when GITHUB_ACTIONS is set).
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: doc/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build (emits dist/_worker.js via the Cloudflare adapter)
        run: pnpm build

      - name: Evaluate deploy gate
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          should=true
          reason=""
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            should=false
            reason="CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secret(s) not set"
          elif grep -q 'REPLACE_ME' wrangler.toml; then
            should=false
            reason="wrangler.toml still has the REPLACE_ME domain placeholder"
          fi
          echo "should_deploy=$should" >> "$GITHUB_OUTPUT"
          if [ "$should" != "true" ]; then
            echo "::notice::Skipping Cloudflare deploy — $reason. Build + typecheck ran; the site was NOT published. Complete the go-live checklist in doc/CLAUDE.md to enable deploys."
          fi

      - name: Prepare deploy artifact
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          # Exclude the worker entry + sidecar from the public asset directory so
          # they are not served as downloadable files (documented in wrangler.toml).
          printf '%s\n' '_worker.js' '_zfb_inner.mjs' > dist/.assetsignore

      - name: Deploy to Cloudflare Workers (production)
        if: steps.gate.outputs.should_deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          n=0
          until [ "$n" -ge 3 ]; do
            npx wrangler@4 deploy --env production 2>&1 | tee deploy.log && break
            n=$((n + 1))
            echo "wrangler deploy failed (attempt $n/3); retrying in 10s..."
            sleep 10
          done
          [ "$n" -lt 3 ]
