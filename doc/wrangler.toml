# Cloudflare Workers Static Assets configuration for the zudo-PD docs site.
# Pure static docs site (no AI-chat worker, KV, or service bindings).
# Built by zfb's @takazudo/zfb-adapter-cloudflare → dist/_worker.js.

name = "zudo-pd"
main = "./dist/_worker.js"

compatibility_date = "2024-12-01"
# nodejs_compat is MANDATORY: the CF adapter bundle at dist/_worker.js imports
# node:async_hooks (AsyncLocalStorage). Without this flag wrangler refuses to
# load the worker even when dist/_worker.js exists.
compatibility_flags = ["nodejs_compat"]

# Static docs site: do not serve on *.workers.dev for production; keep
# version-preview URLs enabled for PR/branch previews.
workers_dev = false
preview_urls = true

# ---------------------------------------------------------------------------
# Static asset serving (top-level keys MUST stay above [assets] — in TOML any
# key after a table header is scoped into that table).
#   not_found_handling = "404-page" serves dist/404.html for unmatched GETs.
#   run_worker_first defaults to false: the asset layer is consulted before the
#   worker; the worker only runs when no matching static asset is found.
# ---------------------------------------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# ---------------------------------------------------------------------------
# Production custom-domain route (deployed via `wrangler deploy --env production`).
#
# custom_domain = true tells wrangler to provision the Workers custom domain and
# its DNS record automatically on first deploy. This requires the
# takazudomodular.com zone to live on the same Cloudflare account as
# CLOUDFLARE_ACCOUNT_ID. The apex takazudomodular.com is the main site, so the
# docs are served from the pd. subdomain.
#
# Keep this hostname in sync with siteUrl in src/config/settings.ts.
# account_id is intentionally omitted — wrangler reads CLOUDFLARE_ACCOUNT_ID
# from the environment.
#
# NOTE: the deploy job in .github/workflows/main-deploy.yml skips the publish
# while this file still contains the literal domain placeholder token, so do not
# reintroduce that token here.
# ---------------------------------------------------------------------------
[[env.production.routes]]
pattern = "pd.takazudomodular.com"
custom_domain = true
